name: Bug Report
description: 提交 Bug 报告帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间提交 Bug 报告！请尽量提供以下信息以便我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 Bug
      placeholder: 调用...接口时，返回了...错误
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重现步骤
      description: 请列出重现此问题的步骤
      placeholder: |
        1. 调用接口 '...'
        2. 传入参数 '...'
        3. 观察到错误响应
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误信息
      description: 请粘贴相关的日志或错误堆栈（注意脱敏）
      render: shell

  - type: input
    id: jdk-version
    attributes:
      label: JDK 版本
      placeholder: "例如: 17, 21"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "例如: Windows 11, macOS 14, Ubuntu 24.04"

  - type: input
    id: db-version
    attributes:
      label: MySQL 版本
      placeholder: "例如: 8.0.35"

  - type: input
    id: redis-version
    attributes:
      label: Redis 版本
      placeholder: "例如: 6.2, 7.0"

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于理解问题的信息
